<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro Media Gateway Test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06030b;
      --panel: #13101d;
      --line: #8f55ff;
      --text: #f7f3ff;
      --muted: #bfb3d7;
      --ok: #65f2ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top left, #24104c, var(--bg) 48%);
      color: var(--text);
      font: 16px Arial, sans-serif;
    }
    main {
      width: 100%;
      height: 100%;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      color: #c59cff;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.35;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button, input {
      border: 1px solid var(--line);
      background: rgba(19, 16, 29, .92);
      color: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      box-shadow: 0 0 12px rgba(143, 85, 255, .35);
    }
    input { width: 100%; }
    #log {
      margin-top: auto;
      min-height: 70px;
      border-top: 1px solid rgba(143, 85, 255, .45);
      padding-top: 12px;
      color: var(--ok);
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Neuro Gateway Test</h1>
    <p>GitHub-hosted media page sending commands to LSL through the wrapper bridge.</p>
    <div class="grid">
      <button data-op="ping">Ping LSL</button>
      <button data-op="health">Health</button>
      <button data-op="wallet">Wallet</button>
      <button data-op="work">Work</button>
      <button data-op="rent">Rent</button>
      <button data-op="custom">Send Text</button>
    </div>
    <input id="text" placeholder="custom command text">
    <div id="log">Waiting for a button.</div>
  </main>
  <script>
    const log = document.querySelector("#log");
    const input = document.querySelector("#text");
    const pending = new Map();

    function qs(data) {
      return Object.entries(data)
        .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
        .join("&");
    }

    function send(op) {
      const tick = String(Date.now());
      const payload = qs({ op, tick, text: input.value || "" });
      pending.set(tick, op);
      log.textContent = `sending ${op}...`;

      if (window.parent && window.parent !== window) {
        window.parent.postMessage(`NEURO_GATEWAY|${payload}`, "*");
        window.setTimeout(() => {
          if (!pending.has(tick)) return;
          pending.delete(tick);
          log.textContent = `${op}: no LSL acknowledgement yet`;
        }, 9000);
        return;
      }

      log.textContent = "No SL wrapper parent detected. Open this page through the LSL media bridge.";
    }

    window.addEventListener("message", (event) => {
      const raw = String(event.data || "");
      if (!raw.startsWith("NEURO_GATEWAY_ACK|")) return;

      const parts = raw.split("|");
      const tick = parts[1] || "";
      const status = parts[2] || "0";
      const response = parts.slice(3).join("|");
      const op = pending.get(tick) || "command";
      pending.delete(tick);
      log.textContent = `${op}: LSL ${status}\n${response}`;
    });

    for (const button of document.querySelectorAll("button[data-op]")) {
      button.addEventListener("click", () => send(button.dataset.op));
    }
  </script>
</body>
</html>
