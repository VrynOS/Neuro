<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro Streaming Tecnology v2</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #050607;
      color: #f5f7fb;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      width: min(920px, 92vw);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: #b7c3d7;
      font-size: 18px;
    }

    .channels {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 18px;
    }

    a {
      display: flex;
      min-height: 150px;
      align-items: center;
      justify-content: center;
      border: 1px solid #263241;
      border-radius: 8px;
      background: #101722;
      color: #ffffff;
      font-size: 30px;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus,
    a:hover {
      background: #16395c;
      border-color: #47a7ff;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 30px;
      }

      .channels {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 110px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Neuro Streaming Tecnology v2</h1>
    <p>Select a channel</p>
    <div class="channels">
      <a href="https://tubitv.com/home">Tubi</a>
      <a href="https://www.pornhub.com/video">Pornhub</a>
    </div>
  </main>
</body>
</html>
