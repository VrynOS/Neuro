<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro Streaming Tecnology v2</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #030611;
      color: #f7fbff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .screen {
      width: 100%;
      min-height: 100%;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 28px 38px 24px;
      background:
        radial-gradient(circle at 50% 78%, rgba(95, 42, 255, 0.38), transparent 22%),
        radial-gradient(circle at 13% 72%, rgba(0, 153, 255, 0.34), transparent 30%),
        radial-gradient(circle at 86% 42%, rgba(179, 40, 255, 0.22), transparent 32%),
        linear-gradient(180deg, #02040d 0%, #050816 48%, #02030a 100%);
      isolation: isolate;
    }

    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .screen::before {
      background:
        repeating-linear-gradient(168deg, transparent 0 18px, rgba(0, 162, 255, 0.16) 19px, transparent 20px),
        repeating-linear-gradient(12deg, transparent 0 25px, rgba(166, 54, 255, 0.15) 26px, transparent 27px);
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 76%);
      animation: drift 12s linear infinite;
      opacity: 0.46;
    }

    .screen::after {
      background:
        linear-gradient(90deg, transparent, rgba(0, 174, 255, 0.34), transparent 33%),
        linear-gradient(270deg, transparent, rgba(201, 64, 255, 0.36), transparent 34%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.04), transparent 18%);
      mask-image: linear-gradient(to top, black, transparent 72%);
      opacity: 0.9;
    }

    header,
    .center,
    footer {
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 26px;
    }

    .kicker {
      margin: 0 0 7px;
      color: #65dfff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: #ffffff;
      font-size: clamp(54px, 10vw, 136px);
      line-height: 0.82;
      letter-spacing: 0;
      text-shadow:
        0 0 10px rgba(106, 205, 255, 0.95),
        0 0 34px rgba(118, 92, 255, 0.62),
        0 0 70px rgba(184, 59, 255, 0.42);
    }

    .subtitle {
      margin: 12px 0 0;
      color: #a6caff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .clock {
      min-width: 250px;
      padding: 12px 16px;
      border: 1px solid rgba(118, 222, 255, 0.35);
      border-radius: 8px;
      background: rgba(4, 10, 24, 0.58);
      box-shadow: 0 0 28px rgba(0, 158, 255, 0.16);
      text-align: right;
    }

    .clock-label {
      color: #8fa8cc;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .clock-time {
      display: block;
      margin-top: 5px;
      color: #ffffff;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 0 18px rgba(111, 219, 255, 0.62);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .clock.swap .clock-time {
      opacity: 0;
      transform: translateY(5px);
    }

    .center {
      display: grid;
      align-content: end;
      gap: 24px;
      padding-bottom: 24px;
    }

    .channels {
      display: grid;
      grid-template-columns: repeat(2, minmax(230px, 1fr));
      gap: 18px;
      max-width: 780px;
      justify-self: end;
      width: 58%;
      min-width: 520px;
    }

    a {
      min-height: 154px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      padding: 18px;
      overflow: hidden;
      border: 1px solid rgba(183, 229, 255, 0.2);
      border-radius: 8px;
      background: rgba(8, 14, 30, 0.72);
      color: #ffffff;
      text-decoration: none;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    a:hover,
    a:focus {
      outline: none;
      transform: translateY(-2px);
      border-color: #8ee9ff;
      box-shadow: 0 0 0 3px rgba(0, 180, 255, 0.16), 0 22px 64px rgba(0, 0, 0, 0.52);
    }

    .tubi {
      background:
        linear-gradient(140deg, rgba(0, 187, 255, 0.18), transparent 45%),
        rgba(8, 14, 30, 0.72);
    }

    .hub {
      background:
        linear-gradient(140deg, rgba(184, 64, 255, 0.2), transparent 48%),
        rgba(8, 14, 30, 0.72);
    }

    .channel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #92acd2;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .channel-name {
      display: block;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }

    .channel-action {
      color: #a8c6e5;
      font-size: 14px;
      font-weight: 700;
    }

    footer {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      color: #88a2c5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .meter {
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter span {
      display: block;
      width: 36%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #00bfff, #7d5cff, #d84dff);
      animation: meter 3s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(83, 189, 255, 0.75);
    }

    @keyframes drift {
      from { transform: translateX(-3%); }
      to { transform: translateX(3%); }
    }

    @keyframes meter {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(180%); }
    }

    @media (max-width: 780px) {
      .screen { padding: 22px; }
      header { flex-direction: column; }
      .clock { min-width: 0; text-align: left; }
      .channels { width: 100%; min-width: 0; grid-template-columns: 1fr; }
      .subtitle { letter-spacing: 5px; }
      footer { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header>
      <section>
        <p class="kicker">Camden Falls Media Grid</p>
        <h1>NEURO</h1>
        <p class="subtitle">Streaming Tecnology</p>
      </section>

      <section class="clock" id="clockBox" aria-label="Time display">
        <div class="clock-label" id="clockLabel">Camden Falls Time</div>
        <span class="clock-time" id="clockTime">--:-- --</span>
      </section>
    </header>

    <section class="center">
      <nav class="channels" aria-label="Streaming channels">
        <a class="tubi" href="https://tubitv.com/home">
          <div class="channel-top"><span>CH 01</span><span>Movies</span></div>
          <strong class="channel-name">Tubi</strong>
          <span class="channel-action">Open channel</span>
        </a>

        <a class="hub" href="https://www.pornhub.com/video">
          <div class="channel-top"><span>CH 02</span><span>Adults</span></div>
          <strong class="channel-name">Pornhub</strong>
          <span class="channel-action">Open channel</span>
        </a>
      </nav>
    </section>

    <footer>
      <span>Touch channel</span>
      <div class="meter" aria-hidden="true"><span></span></div>
      <span>Signal ready</span>
    </footer>
  </main>

  <script>
    var showCamdenTime = true;

    function formatTime(date) {
      return new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(date);
    }

    function updateClock() {
      var clockBox = document.getElementById("clockBox");
      var clockLabel = document.getElementById("clockLabel");
      var clockTime = document.getElementById("clockTime");
      var now = new Date();
      var camdenTime = new Date(now.getTime() - (8 * 60 * 60 * 1000));

      clockBox.classList.add("swap");

      setTimeout(function () {
        if (showCamdenTime) {
          clockLabel.textContent = "Camden Falls Time";
          clockTime.textContent = formatTime(camdenTime);
        } else {
          clockLabel.textContent = "RL Time";
          clockTime.textContent = formatTime(now);
        }

        clockBox.classList.remove("swap");
        showCamdenTime = !showCamdenTime;
      }, 220);
    }

    updateClock();
    setInterval(updateClock, 8000);
  </script>
</body>
</html>
