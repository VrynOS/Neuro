<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neuro Media Hud V6</title>
  <link rel="stylesheet" href="assets/css/style.css?v=emoji-profile-clean-1">
</head>
<body>
  <main class="hud-shell" data-screen="home">
    <header class="hud-top">
      <section class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="assets/img/neuro-crystal-logo.png" alt="">
        </div>
        <div>
          <h1>NEURO</h1>
          <p>MEDIA HUD SYSTEM</p>
        </div>
      </section>
      <section class="top-status">
        <button class="icon-button" type="button" data-command="notify" aria-label="Notifications">
          <span class="emoji-icon">🔔</span>
        </button>
        <time id="slt-clock">12:23 <span>SLT</span></time>
      </section>
    </header>

    <nav class="hud-nav" aria-label="Neuro navigation">
      <button class="nav-button is-active" type="button" data-screen-target="home"><span class="nav-icon"><span class="emoji-icon">🏠</span></span><span>Home</span></button>
      <button class="nav-button" type="button" data-screen-target="profile"><span class="nav-icon"><span class="emoji-icon">👤</span></span><span>Profile</span></button>
      <button class="nav-button" type="button" data-screen-target="wallet"><span class="nav-icon"><span class="emoji-icon">👛</span></span><span>Wallet</span></button>
      <button class="nav-button" type="button" data-command="health"><span class="nav-icon"><span class="emoji-icon">💙</span></span><span>Health</span></button>
      <button class="nav-button" type="button" data-command="work"><span class="nav-icon"><span class="emoji-icon">💼</span></span><span>Work</span></button>
      <button class="nav-button" type="button" data-screen-target="settings"><span class="nav-icon"><span class="emoji-icon">⚙️</span></span><span>Settings</span></button>
    </nav>

    <section class="screen screen-home is-active" id="screen-home">
      <section class="body-status">
        <div class="status-orb">
          <span>Body Status</span>
          <strong>Stable</strong>
          <small>NEURO</small>
        </div>
      </section>

      <section class="stat-panel" aria-label="Core stats">
        <article data-stat="hunger" data-value="82"><span class="stat-icon"><span class="emoji-icon">✅</span></span><span>Hunger</span><strong>82%</strong></article>
        <article data-stat="thirst" data-value="64"><span class="stat-icon"><span class="emoji-icon">➕</span></span><span>Thirst</span><strong>64%</strong></article>
        <article data-stat="energy" data-value="91"><span class="stat-icon"><span class="emoji-icon">✅</span></span><span>Energy</span><strong>91%</strong></article>
        <article data-stat="hygiene" data-value="88"><span class="stat-icon"><span class="emoji-icon">✅</span></span><span>Hygiene</span><strong>88%</strong></article>
        <article data-stat="fun" data-value="55"><span class="stat-icon"><span class="emoji-icon">➕</span></span><span>Fun</span><strong>55%</strong></article>
        <article data-stat="xp" data-value="78"><span class="stat-icon"><span class="emoji-icon">✅</span></span><span>XP</span><strong>78%</strong></article>
      </section>

      <section class="quick-cards">
        <button class="quick-card" type="button" data-screen-target="wallet">
          <span class="card-icon"><span class="emoji-icon">👛</span></span>
          <span class="card-copy"><span>Wallet</span><strong>GC 3,310</strong></span>
          <b>&gt;</b>
        </button>
        <button class="quick-card" type="button" data-command="health">
          <span class="card-icon"><span class="emoji-icon">💙</span></span>
          <span class="card-copy"><span>Health</span><strong>Cycle: Follicular</strong><small>Care: Stable</small></span>
          <b>&gt;</b>
        </button>
        <button class="quick-card" type="button" data-command="work">
          <span class="card-icon"><span class="emoji-icon">💼</span></span>
          <span class="card-copy"><span>Work</span><strong>Work: Off Duty</strong></span>
          <b>&gt;</b>
        </button>
      </section>
    </section>

    <section class="screen screen-wallet" id="screen-wallet">
      <h2>G Coin Wallet</h2>
      <section class="wallet-list">
        <article>
          <div>
            <span>Checking</span>
            <small>Eye to hide</small>
          </div>
          <button type="button" data-wallet-eye="checking">Eye</button>
          <strong data-balance="checking">GC 3,310</strong>
        </article>
        <article>
          <div>
            <span>Savings</span>
            <small>Eye to hide</small>
          </div>
          <button type="button" data-wallet-eye="savings">Eye</button>
          <strong data-balance="savings">GC 12,500</strong>
        </article>
      </section>
      <button class="wide-action" type="button" data-command="wallet">Balance / Refresh</button>
      <section class="wallet-actions">
        <button type="button" data-command="wallet-request">Request</button>
        <button type="button" data-command="wallet-transfer">Transfer</button>
        <button type="button" data-command="wallet-transactions">Transactions</button>
      </section>
    </section>

    <section class="screen screen-profile" id="screen-profile">
      <section class="profile-card">
        <div class="profile-avatar-frame">
          <img src="assets/img/avatars/avatar-01.png" alt="" data-avatar-display>
        </div>
        <div class="profile-copy">
          <div class="profile-actions">
            <button class="profile-edit" type="button" data-command="edit-profile"><span class="emoji-icon">✏️</span>Edit Info</button>
            <button class="profile-edit" type="button" data-command="profile"><span class="emoji-icon">🪪</span>Show Profile</button>
          </div>
        </div>
      </section>
      <section class="profile-grid">
        <article><span>Title</span><strong data-profile-field="title">Resident</strong></article>
        <article><span>Name</span><strong data-profile-field="name">Neuro Resident</strong></article>
        <article><span>Age</span><strong data-profile-field="age">Adult</strong></article>
        <article><span>Sex</span><strong data-profile-field="sex">Not Set</strong></article>
        <article><span>Location</span><strong data-profile-field="location">Not Set</strong></article>
      </section>
    </section>

    <section class="screen screen-settings" id="screen-settings">
      <h2>Settings</h2>
      <button class="wide-action" type="button" data-command="ping">Ping LSL</button>
      <button class="wide-action" type="button" data-command="notify">Notifications</button>
      <pre id="bridge-log" aria-live="polite"></pre>
    </section>
  </main>

  <script src="assets/js/app.js?v=emoji-profile-clean-1"></script>
</body>
</html>
